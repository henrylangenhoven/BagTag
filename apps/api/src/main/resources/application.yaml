spring:
  application:
    name: BagTag-Api
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/bagtag}
    username: ${SPRING_DATASOURCE_USERNAME:bagtag}
    password: ${SPRING_DATASOURCE_PASSWORD:bagtag}
    hikari:
      pool-name: BagTagApiPool
  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:true}
    locations: classpath:db/migration

logging:
  level:
    org.flywaydb: INFO
    org.springframework.boot.autoconfigure.flyway: DEBUG

bagtag:
  version: ${BAGTAG_VERSION:0.0.1}
  auth:
    magic-link:
      base-url: ${BAGTAG_MAGIC_LINK_BASE_URL:http://localhost:4200/login}
  notifications:
    resend:
      api-key: ${RESEND_API_KEY:}
      from-email: ${RESEND_FROM_EMAIL:onboarding@resend.dev}
      from-name: ${RESEND_FROM_NAME:BagTag}
      reply-to: ${RESEND_REPLY_TO:}
