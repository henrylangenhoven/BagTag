<div class="app-shell">
  <header class="topbar">
    <a class="brand" routerLink="/">
      <img class="brand-logo" src="/BagTag-Logo.png" alt="BagTag" />
      <span class="brand-copy">
        <strong>BagTag</strong>
        <span>Privacy-first luggage tags</span>
      </span>
    </a>

    <nav class="nav">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }"
        >Home</a
      >
      <a routerLink="/t/demo-tag" routerLinkActive="active">Public Tag</a>
      <a routerLink="/owner" routerLinkActive="active">Owner</a>
      <a routerLink="/login" routerLinkActive="active">Login</a>
    </nav>
  </header>

  <main class="page-frame">
    <router-outlet />
  </main>
</div>
