name: CI

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  api-checks:
    name: API checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Verify API
        run: ./gradlew --no-daemon check bootJar

  web-checks:
    name: Web checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Regenerate API client from checked-in OpenAPI document
        run: npm run api:generate

      - name: Verify generated API client is committed
        run: git diff --exit-code -- src/app/generated/bagtag-api

      - name: Build web app
        run: npm run build

      - name: Run frontend tests
        env:
          CI: "true"
        run: npm test -- --watch=false

  publish-preview-images:
    name: Publish preview images
    runs-on: ubuntu-latest
    needs:
      - api-checks
      - web-checks
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: api
            context: apps/api
            dockerfile: apps/api/Dockerfile
            package_name: bagtag-api-preview
          - component: web
            context: apps/web
            dockerfile: apps/web/Dockerfile
            package_name: bagtag-web-preview
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Prepare image coordinates
        id: prep
        env:
          PACKAGE_NAME: ${{ matrix.package_name }}
        run: |
          echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/${PACKAGE_NAME}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push preview image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ steps.prep.outputs.image }}:pr-${{ github.event.pull_request.number }}
            ${{ steps.prep.outputs.image }}:pr-${{ github.event.pull_request.number }}-sha-${{ github.sha }}
          cache-from: type=gha,scope=preview-${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=preview-${{ matrix.component }}

      - name: Retain the latest 3 preview versions for this PR
        uses: actions/github-script@v7
        env:
          OWNER: ${{ github.repository_owner }}
          OWNER_TYPE: ${{ github.event.repository.owner.type }}
          PACKAGE_NAME: ${{ matrix.package_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        with:
          script: |
            const owner = process.env.OWNER;
            const ownerType = process.env.OWNER_TYPE;
            const packageName = process.env.PACKAGE_NAME;
            const prNumber = process.env.PR_NUMBER;
            const immutablePrefix = `pr-${prNumber}-sha-`;
            const listRoute = ownerType === "Organization"
              ? "GET /orgs/{org}/packages/{package_type}/{package_name}/versions"
              : "GET /users/{username}/packages/{package_type}/{package_name}/versions";
            const listParams = ownerType === "Organization"
              ? { org: owner, package_type: "container", package_name: packageName, per_page: 100 }
              : { username: owner, package_type: "container", package_name: packageName, per_page: 100 };
            const versions = await github.paginate(listRoute, listParams);
            const matchingVersions = versions
              .filter((version) => (version.metadata?.container?.tags ?? []).some((tag) => tag.startsWith(immutablePrefix)))
              .sort((left, right) => new Date(right.created_at) - new Date(left.created_at));
            const versionsToDelete = matchingVersions.slice(3);

            if (versionsToDelete.length === 0) {
              core.info(`No old preview versions to delete for ${packageName}.`);
              return;
            }

            const deleteRoute = ownerType === "Organization"
              ? "DELETE /orgs/{org}/packages/{package_type}/{package_name}/versions/{package_version_id}"
              : "DELETE /users/{username}/packages/{package_type}/{package_name}/versions/{package_version_id}";

            for (const version of versionsToDelete) {
              const deleteParams = ownerType === "Organization"
                ? { org: owner, package_type: "container", package_name: packageName, package_version_id: version.id }
                : { username: owner, package_type: "container", package_name: packageName, package_version_id: version.id };
              await github.request(deleteRoute, deleteParams);
              core.info(`Deleted ${packageName} version ${version.id}.`);
            }

  publish-release-images:
    name: Publish release images
    runs-on: ubuntu-latest
    needs:
      - api-checks
      - web-checks
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: api
            context: apps/api
            dockerfile: apps/api/Dockerfile
            package_name: bagtag-api
          - component: web
            context: apps/web
            dockerfile: apps/web/Dockerfile
            package_name: bagtag-web
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Prepare image coordinates
        id: prep
        env:
          PACKAGE_NAME: ${{ matrix.package_name }}
        run: |
          echo "image=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/${PACKAGE_NAME}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push release image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ steps.prep.outputs.image }}:main
            ${{ steps.prep.outputs.image }}:sha-${{ github.sha }}
          cache-from: type=gha,scope=release-${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=release-${{ matrix.component }}

  required-checks:
    name: Required checks
    runs-on: ubuntu-latest
    if: always()
    needs:
      - api-checks
      - web-checks
      - publish-preview-images
      - publish-release-images
    steps:
      - name: Fail if a required job failed
        env:
          API_RESULT: ${{ needs.api-checks.result }}
          WEB_RESULT: ${{ needs.web-checks.result }}
          PREVIEW_RESULT: ${{ needs.publish-preview-images.result }}
          RELEASE_RESULT: ${{ needs.publish-release-images.result }}
        run: |
          if [[ "$API_RESULT" != "success" || "$WEB_RESULT" != "success" ]]; then
            echo "api-checks=$API_RESULT"
            echo "web-checks=$WEB_RESULT"
            exit 1
          fi

          if [[ "$PREVIEW_RESULT" != "success" && "$PREVIEW_RESULT" != "skipped" ]]; then
            echo "publish-preview-images=$PREVIEW_RESULT"
            exit 1
          fi

          if [[ "$RELEASE_RESULT" != "success" && "$RELEASE_RESULT" != "skipped" ]]; then
            echo "publish-release-images=$RELEASE_RESULT"
            exit 1
          fi
