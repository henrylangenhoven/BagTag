name: Preview Deploy

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed

permissions:
  contents: read

concurrency:
  group: preview-${{ github.event.workflow_run.pull_requests[0].number || github.event.workflow_run.id }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    name: Deploy preview environment
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'pull_request' && github.event.workflow_run.head_repository.full_name == github.repository
    env:
      PR_NUMBER: ${{ github.event.workflow_run.pull_requests[0].number }}
      PREVIEW_BASE_DOMAIN: ${{ vars.PREVIEW_BASE_DOMAIN }}
      PREVIEW_INGRESS_CLASS: ${{ vars.PREVIEW_INGRESS_CLASS }}
      IMAGE_REGISTRY_OWNER: ${{ github.repository_owner }}
      GHCR_PULL_USERNAME: ${{ secrets.GHCR_PULL_USERNAME }}
      GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
      PREVIEW_RESEND_API_KEY: ${{ secrets.PREVIEW_RESEND_API_KEY }}
      PREVIEW_RESEND_FROM_EMAIL: ${{ vars.PREVIEW_RESEND_FROM_EMAIL }}
      PREVIEW_RESEND_FROM_NAME: ${{ vars.PREVIEW_RESEND_FROM_NAME }}
      PREVIEW_RESEND_REPLY_TO: ${{ vars.PREVIEW_RESEND_REPLY_TO }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Write kubeconfig
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG }}
        run: |
          umask 077
          printf '%s' "$KUBE_CONFIG_DATA" > "$RUNNER_TEMP/kubeconfig"
          echo "KUBECONFIG=$RUNNER_TEMP/kubeconfig" >> "$GITHUB_ENV"

      - name: Make preview deploy script executable
        run: chmod +x deploy/scripts/deploy-preview.sh

      - name: Deploy preview namespace
        run: ./deploy/scripts/deploy-preview.sh
