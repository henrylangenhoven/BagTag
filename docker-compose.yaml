services:
  postgres:
    image: postgres:17-alpine
    container_name: bagtag-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bagtag}
      POSTGRES_USER: ${POSTGRES_USER:-bagtag}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bagtag}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bagtag -d bagtag"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: bagtag-api
    restart: unless-stopped
    environment:
      BAGTAG_MAGIC_LINK_BASE_URL: ${BAGTAG_MAGIC_LINK_BASE_URL:-http://localhost:4280/login}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-onboarding@resend.dev}
      RESEND_FROM_NAME: ${RESEND_FROM_NAME:-BagTag}
      RESEND_REPLY_TO: ${RESEND_REPLY_TO:-}
    ports:
      - "8180:8080"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: bagtag-web
    restart: unless-stopped
    ports:
      - "4280:80"
    depends_on:
      - api

volumes:
  postgres-data:
