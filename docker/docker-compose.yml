services:
  postgres:
    image: postgres:17-alpine
    container_name: bagtag-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: bagtag
      POSTGRES_USER: bagtag
      POSTGRES_PASSWORD: bagtag
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bagtag -d bagtag"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres-data:
