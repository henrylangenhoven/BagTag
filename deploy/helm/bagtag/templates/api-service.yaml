apiVersion: v1
kind: Service
metadata:
  name: {{ include "bagtag.apiServiceName" . }}
  labels:
    {{- include "bagtag.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  selector:
    {{- include "bagtag.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api
  ports:
    - name: http
      port: {{ .Values.api.service.port }}
      targetPort: http
