apiVersion: v1
kind: Service
metadata:
  name: {{ include "bagtag.webServiceName" . }}
  labels:
    {{- include "bagtag.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  selector:
    {{- include "bagtag.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: web
  ports:
    - name: http
      port: {{ .Values.web.service.port }}
      targetPort: http
